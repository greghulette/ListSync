<!DOCTYPE html>
<!--
  ListSync — M1 (local only) + due dates & calendar reminders
  ===========================================================
  A complete, working shared-list app... except it doesn't sync yet.
  Right now it saves everything to THIS browser (using "localStorage").
  In M2 we'll swap that storage for Firebase so both phones share the data.

  NEW: items can have a DUE DATE (tap 📅). When one does, a "🔔 Remind" button
  opens Google Calendar pre-filled, and Google handles the actual notification.
  That part needs no server at all — it's just a cleverly-built link.

  NEW (compact rows): every item is now ONE tight line — checkbox, name, a small
  due-date chip, and a ▾ caret. Tap the line to expand it and get the full chips
  (📅 date, ⏰ time, 🔔 Remind) plus ✏️ edit and ✕ delete. Tap the checkbox to
  check off instantly without expanding. A 20-item list scans much faster now.

  NEW (list colors): every list gets its own identity color — a soft wash of one
  of six hues over its row on the home screen (badge in the solid color), and the
  header tints to match while you're inside the list. Colors are assigned
  automatically when a list is created and sync like everything else.

  NEW (photos): each item can hold a photo (📷 in the expanded line) — snapped or picked
  from the gallery, auto-shrunk to a small sharp image, and stored as its own cloud record
  so it syncs without bloating the lists. A thumbnail shows on the row; tap it to view big
  or remove.

  NEW (light mode): tap ☀️/🌙 in the header to switch light/dark. The choice is remembered
  on each device and defaults to your phone's system setting.

  To run it: just double-click this file. It opens in your browser.
  Everything you add is saved automatically and survives a refresh.

  The file has 3 parts, like most web pages:
    1. <style>  = how it LOOKS   (CSS)
    2. <body>   = the SKELETON   (HTML)
    3. <script> = the BRAIN      (JavaScript)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f1220" />
  <title>ListSync</title>

  <!-- these make it installable as a real app on your phone's home screen -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- apply the saved/system theme BEFORE paint so there's no flash of the wrong colors -->
  <script>
    (function () {
      var t = localStorage.getItem("theme");
      if (!t) t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      if (t === "light") {
        document.documentElement.classList.add("light");
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.content = "#f4f6fb";
      }
    })();
  </script>

  <!-- ============ 1. HOW IT LOOKS (CSS) ============ -->
  <style>
    :root {
      --bg:#0f1220; --card:#1b2030; --accent:#4f8cff; --text:#e8ecf4;
      --muted:#8b93a7; --danger:#ff5d6c; --done:#5a6276; --line:#2a3146;
      /* the six list identity colors + their badge text colors */
      --list-0:#4f8cff; --list-0-text:#fff;    --tint-0:rgba(79,140,255,.14);
      --list-1:#3ecf8e; --list-1-text:#0f1220; --tint-1:rgba(62,207,142,.12);
      --list-2:#ffc107; --list-2-text:#0f1220; --tint-2:rgba(255,193,7,.10);
      --list-3:#ff7ac6; --list-3-text:#0f1220; --tint-3:rgba(255,122,198,.12);
      --list-4:#b07cff; --list-4-text:#fff;    --tint-4:rgba(176,124,255,.13);
      --list-5:#45d6e0; --list-5-text:#0f1220; --tint-5:rgba(69,214,224,.11);
    }
    * { box-sizing: border-box; }
    body {
      margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
    }
    #app { max-width:560px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

    header {
      display:flex; align-items:center; gap:8px; padding:14px 16px;
      background:var(--card); position:sticky; top:0; z-index:5;
    }
    header h1 { font-size:20px; margin:0; flex:1; }
    #back-btn { font-size:26px; line-height:1; }

    main { flex:1; padding:14px 16px 60px; }

    /* a card-like row, used for both lists and items */
    .row {
      display:flex; align-items:center; gap:12px; background:var(--card);
      border-radius:12px; padding:14px; margin-bottom:10px; cursor:pointer;
      user-select:none;
    }
    .row:active { transform:scale(0.99); }
    .row-name, .item-name { flex:1; font-size:17px; }
    .badge {
      background:var(--accent); color:#fff; border-radius:999px;
      padding:2px 10px; font-size:14px; min-width:26px; text-align:center;
    }

    /* each list's identity color: a soft wash over the card for rows + the
       detail-view header, and the solid color on the count badge */
    .row.list-0, header.list-0 { background:linear-gradient(var(--tint-0),var(--tint-0)), var(--card); }
    .row.list-1, header.list-1 { background:linear-gradient(var(--tint-1),var(--tint-1)), var(--card); }
    .row.list-2, header.list-2 { background:linear-gradient(var(--tint-2),var(--tint-2)), var(--card); }
    .row.list-3, header.list-3 { background:linear-gradient(var(--tint-3),var(--tint-3)), var(--card); }
    .row.list-4, header.list-4 { background:linear-gradient(var(--tint-4),var(--tint-4)), var(--card); }
    .row.list-5, header.list-5 { background:linear-gradient(var(--tint-5),var(--tint-5)), var(--card); }
    .badge.list-0 { background:var(--list-0); color:var(--list-0-text); }
    .badge.list-1 { background:var(--list-1); color:var(--list-1-text); }
    .badge.list-2 { background:var(--list-2); color:var(--list-2-text); }
    .badge.list-3 { background:var(--list-3); color:var(--list-3-text); }
    .badge.list-4 { background:var(--list-4); color:var(--list-4-text); }
    .badge.list-5 { background:var(--list-5); color:var(--list-5-text); }

    .item-row .box { font-size:20px; width:24px; }
    .item-row.done { opacity:.55; }
    .item-row.done .item-name { text-decoration:line-through; color:var(--done); }

    /* item rows are ONE compact line (checkbox + name + mini due chip + caret).
       Tapping the line expands it into a detail line with the full chips and
       the edit/delete buttons. Denser than list rows on purpose. */
    .item-row { flex-direction:column; align-items:stretch; gap:8px; cursor:default;
                padding:10px 14px; margin-bottom:8px; }
    .item-top  { display:flex; align-items:center; gap:12px; cursor:pointer; min-height:28px; }
    .item-sub  { display:flex; flex-wrap:wrap; align-items:center; gap:8px; padding-left:36px; }
    .due-mini  { padding:3px 8px; font-size:12px; pointer-events:none; white-space:nowrap; }
    .caret     { color:var(--muted); font-size:12px; user-select:none; }
    .flex-spacer { flex:1; }

    .chip {
      border:none; border-radius:999px; padding:6px 10px;
      font-size:13px; cursor:pointer; color:var(--text);
      background:rgba(255,255,255,.08);
    }
    .chip.overdue   { background:rgba(255,93,108,.18); color:#ffb3bb; }
    .chip.due-today { background:rgba(255,193,7,.20);  color:#ffd86b; }
    .chip.remind    { background:rgba(79,140,255,.20); color:#aecbff; }
    .chip.muted     { color:var(--muted); }

    .divider {
      color:var(--muted); font-size:12px; text-transform:uppercase;
      letter-spacing:.06em; margin:16px 4px 8px;
    }

    .icon-btn {
      background:transparent; border:none; color:var(--muted);
      font-size:20px; cursor:pointer; padding:6px 8px; border-radius:8px;
    }
    .icon-btn:hover { background:rgba(255,255,255,.06); }

    /* the "add an item / add a list" bar */
    .add-bar { display:flex; gap:8px; margin-bottom:14px; }
    .add-bar.sticky { position:sticky; top:62px; z-index:4; }
    .add-bar input {
      flex:1; padding:14px; border-radius:12px; border:1px solid var(--line);
      background:var(--card); color:var(--text); font-size:16px;
    }
    .add-bar input:focus { outline:none; border-color:var(--accent); }
    .add-bar button {
      width:52px; border:none; border-radius:12px; background:var(--accent);
      color:#fff; font-size:24px; cursor:pointer;
    }

    .clear {
      display:block; width:100%; padding:14px; margin-top:6px;
      border:1px solid #3a2030; border-radius:12px; background:transparent;
      color:var(--danger); font-size:16px; cursor:pointer;
    }
    .clear:hover { background:rgba(255,93,108,.08); }

    .empty { color:var(--muted); text-align:center; padding:36px 12px; }

    /* one hidden date picker, reused for every item */
    #date-picker, #time-picker { position:fixed; left:12px; bottom:12px; width:1px; height:1px; opacity:0; }

    /* little confirmation pop-up at the bottom of the screen */
    #toast {
      position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
      background:#20283c; color:var(--text); padding:12px 16px; border-radius:12px;
      font-size:14px; box-shadow:0 6px 20px rgba(0,0,0,.4); opacity:0; pointer-events:none;
      transition:opacity .2s, transform .2s; max-width:90%; text-align:center; z-index:50;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* sign-in screen */
    #signin {
      position:fixed; inset:0; z-index:100; background:var(--bg);
      display:none; align-items:center; justify-content:center; padding:24px;
    }
    #signin.show { display:flex; }
    .signin-box { text-align:center; max-width:320px; width:100%; }
    .signin-logo {
      width:64px; height:64px; margin:0 auto 14px; border-radius:16px;
      background:var(--accent); color:#fff; font-size:34px; line-height:64px;
    }
    .signin-box h2 { margin:0 0 6px; font-size:26px; }
    .signin-box p  { color:var(--muted); margin:0 0 22px; }
    #signin-btn {
      width:100%; padding:14px 20px; border:none; border-radius:12px;
      background:#fff; color:#222; font-size:16px; font-weight:600; cursor:pointer;
    }
    .signin-msg { color:var(--danger); font-size:14px; margin-top:16px; min-height:18px; }

    /* item photo: small thumbnail in the row + full-screen viewer */
    .thumb { width:30px; height:30px; border-radius:6px; object-fit:cover; flex:none; cursor:pointer; }
    .lightbox {
      position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.85);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; padding:24px;
    }
    .lightbox img { max-width:100%; max-height:78vh; border-radius:12px; }

    /* ============ LIGHT MODE ============ */
    /* The toggle adds class="light" to <html>. We flip the neutral variables, then patch
       the few spots that used white-on-dark washes (which would vanish on a light bg). */
    html.light {
      --bg:#f4f6fb; --card:#ffffff; --text:#1b2333;
      --muted:#667085; --danger:#e5484d; --done:#9aa3b2; --line:#e2e6ef;
    }
    html.light .chip            { background:rgba(0,0,0,.06); }
    html.light .chip.overdue    { background:rgba(229,72,77,.15); color:#b42318; }
    html.light .chip.due-today  { background:rgba(217,160,0,.22); color:#8a5a00; }
    html.light .chip.remind     { background:rgba(37,99,235,.13); color:#1d4ed8; }
    html.light .icon-btn:hover  { background:rgba(0,0,0,.05); }
    html.light .clear           { border-color:rgba(229,72,77,.35); }
    html.light #signin-btn      { border:1px solid var(--line); }
    html.light #toast           { background:#2b3344; color:#eef1f7; }
  </style>
</head>

<body>
  <!-- ============ 2. THE SKELETON (HTML) ============ -->
  <div id="app">
    <header>
      <button id="back-btn" class="icon-btn" title="Back">&#8249;</button>
      <h1 id="title">ListSync</h1>
      <button id="theme-btn" class="icon-btn" title="Toggle light / dark">☀️</button>
      <button id="signout-btn" class="icon-btn" title="Sign out" style="display:none;">⎋</button>
    </header>

    <main>
      <!-- HOME VIEW: the list of lists -->
      <section id="home">
        <div id="lists"></div>
        <div class="add-bar">
          <input id="new-list-input" placeholder="New list name…" />
          <button id="add-list-btn" title="Add list">+</button>
        </div>
      </section>

      <!-- DETAIL VIEW: the items inside one list -->
      <section id="detail" style="display:none;">
        <div class="add-bar sticky">
          <input id="new-item-input" placeholder="Add an item…" />
          <button id="add-item-btn" title="Add item">+</button>
        </div>
        <div id="items"></div>
        <button id="clear-btn" class="clear">Clear checked items</button>
      </section>
    </main>
  </div>

  <!-- Sign-in screen (covers everything until you sign in with Google) -->
  <section id="signin">
    <div class="signin-box">
      <div class="signin-logo">✓</div>
      <h2>ListSync</h2>
      <p>Sign in to see your shared lists.</p>
      <button id="signin-btn">Sign in with Google</button>
      <p id="signin-msg" class="signin-msg"></p>
    </div>
  </section>

  <!-- one shared, hidden date picker we pop open for any item's due date -->
  <input type="date" id="date-picker" aria-hidden="true" />
  <input type="time" id="time-picker" aria-hidden="true" />
  <input type="file" id="photo-input" accept="image/*" aria-hidden="true" style="display:none;" />

  <!-- Google Identity Services — for the one-time calendar authorization -->
  <script src="https://accounts.google.com/gsi/client" async></script>

  <!-- ============ 3. THE BRAIN (JavaScript) ============ -->
  <script type="module">
    // ---------- FIREBASE (cloud sync) ----------
    // Imported straight from Google's CDN — no build tools, no npm.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, collection, onSnapshot, setDoc, deleteDoc }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBX1K4MNoyllDnfwLwWbVyUNM-KEBzu1jQ",
      authDomain: "listsync-5d6b2.firebaseapp.com",
      projectId: "listsync-5d6b2",
      storageBucket: "listsync-5d6b2.firebasestorage.app",
      messagingSenderId: "966386909489",
      appId: "1:966386909489:web:c551c107cf2760a6087010",
    };
    const fbApp = initializeApp(firebaseConfig);
    const db = getFirestore(fbApp);
    const auth = getAuth(fbApp);
    const provider = new GoogleAuthProvider();
    const sharedDoc = doc(db, "app", "shared");   // ONE document holds all the lists
    const photosCol = collection(db, "photos");   // each item's photo is its own small record
    const photos = new Map();                      // itemId -> compressed image (data URL)
    let photoTargetId = null;                      // which item we're attaching a photo to

    // ---------- THE DATA ----------
    // state.lists is the shared data (it lives in Firestore). currentListId is just
    // which screen THIS phone is looking at, so it stays local to the device.
    let state = { currentListId: null, lists: [] };
    let connected = false;

    // a quick unique id, e.g. "lq8f3a-k29x1"
    function uid() { return Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 7); }

    // ---------- SIGN-IN GATE ----------
    // Only show the app to a signed-in account. onAuthStateChanged fires on load with the
    // saved session, and again whenever you sign in or out.
    let unsubscribeSnap = null, unsubscribePhotos = null;
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById("signin").classList.remove("show");
        document.getElementById("signout-btn").style.display = "";
        startSync();
      } else {
        if (unsubscribeSnap)   { unsubscribeSnap();   unsubscribeSnap = null; }
        if (unsubscribePhotos) { unsubscribePhotos(); unsubscribePhotos = null; }
        connected = false; state.lists = []; photos.clear();
        document.getElementById("signout-btn").style.display = "none";
        document.getElementById("signin").classList.add("show");
      }
    });

    // ---------- SYNC: listen (read) + save (write) ----------
    // Listen for cloud changes. Fires right away with current data, then again every
    // time EITHER phone changes something — that's what makes it live.
    function startSync() {
      if (unsubscribeSnap) return;  // already listening
      unsubscribeSnap = onSnapshot(sharedDoc, (snap) => {
        connected = true;
        if (!snap.exists()) { seedInitial(); return; }  // very first run ever
        state.lists = snap.data().lists || [];
        render();
      }, (err) => {
        connected = true;
        console.error(err);
        showError(err.code === "permission-denied"
          ? "Your account isn't on the allow-list for these lists yet."
          : "Can't reach the database. Make sure Firestore exists in the Firebase console.");
      });
      // photos live in their own little records, loaded/updated independently of the lists
      unsubscribePhotos = onSnapshot(photosCol, (snap) => {
        snap.docChanges().forEach(ch => {
          if (ch.type === "removed") photos.delete(ch.doc.id);
          else photos.set(ch.doc.id, ch.doc.data().data);
        });
        render();
      });
    }

    // Save = push the whole lists array to the cloud. The listener above then echoes
    // it back to every device (including this one). Intentionally dead simple.
    function save() { setDoc(sharedDoc, { lists: state.lists }); }

    // First-ever run: create a starter list so it isn't empty.
    function seedInitial() {
      state.lists = [{
        id: uid(), name: "Groceries", color: 0, items: [
          { id: uid(), name: "Milk",    checked: false, dueDate: addDays(todayYMD(), -1) },
          { id: uid(), name: "Eggs",    checked: false, dueDate: todayYMD() },
          { id: uid(), name: "Bread",   checked: false },
          { id: uid(), name: "Bananas", checked: true  },
        ]
      }];
      save();    // persist to the cloud
      render();  // and show it right away
    }

    // Friendly message instead of a blank screen if the cloud isn't reachable.
    function showError(msg) {
      const home = document.getElementById("lists");
      if (home) { home.innerHTML = ""; home.append(el("p", { className: "empty", textContent: "⚠️ " + msg })); }
      showView("home");
    }
    // Shown briefly while we wait for the first data from the cloud.
    function renderConnecting() {
      const home = document.getElementById("lists");
      home.innerHTML = "";
      home.append(el("p", { className: "empty", textContent: "Connecting…" }));
      showView("home");
    }

    // ---------- DUE DATES & CALENDAR REMINDERS ----------
    // Due dates are stored as plain "YYYY-MM-DD" text — the same format the date
    // picker speaks, and it sorts/compares correctly as a string.
    function todayYMD() {
      const d = new Date(), p = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
    }
    function addDays(ymd, n) {
      const [y, m, d] = ymd.split("-").map(Number);
      const dt = new Date(y, m - 1, d + n), p = x => String(x).padStart(2, "0");
      return `${dt.getFullYear()}-${p(dt.getMonth() + 1)}-${p(dt.getDate())}`;
    }
    function formatDue(ymd) {
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const [y, m, d] = ymd.split("-").map(Number);
      return `${months[m - 1]} ${d}`;
    }
    // returns "overdue", "due-today", or "" — controls the chip's color
    function dueClass(item) {
      if (!item.dueDate) return "";
      const today = todayYMD();
      if (item.dueDate <  today)  return "overdue";
      if (item.dueDate === today) return "due-today";
      return "";
    }
    // Pretty-print a 24h "17:30" as "5:30 PM".
    function formatTime(hm) {
      let [H, M] = hm.split(":").map(Number);
      const ap = H >= 12 ? "PM" : "AM";
      H = H % 12; if (H === 0) H = 12;
      return `${H}:${String(M).padStart(2, "0")} ${ap}`;
    }
    // ---------- SILENT CALENDAR ADD (Google Calendar API) ----------
    const GOOGLE_CLIENT_ID = "339318870126-fc1645r91259jeimrtag82m4f1estrsi.apps.googleusercontent.com";
    const CALENDAR_ID = "ph61onmsfo58lrtk4g4rttokck@group.calendar.google.com"; // "Sarah Greg Kloey"
    const CALENDAR_SCOPE = "https://www.googleapis.com/auth/calendar.events";
    let tokenClient = null, accessToken = null, tokenExpiry = 0;

    // Get a Google access token. First time on a device: one-time consent popup. After that: silent.
    function getCalendarToken() {
      return new Promise((resolve, reject) => {
        if (accessToken && Date.now() < tokenExpiry - 60000) return resolve(accessToken);
        if (!window.google?.accounts?.oauth2)
          return reject(new Error("Google sign-in still loading — tap Remind again in a second."));
        if (!tokenClient) {
          tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID, scope: CALENDAR_SCOPE, callback: () => {},
          });
        }
        tokenClient.callback = (resp) => {
          if (resp.error) return reject(new Error(resp.error));
          localStorage.setItem("cal_granted", "1");
          accessToken = resp.access_token;
          tokenExpiry = Date.now() + (resp.expires_in || 3600) * 1000;
          resolve(accessToken);
        };
        const firstTime = localStorage.getItem("cal_granted") !== "1";
        tokenClient.requestAccessToken({ prompt: firstTime ? "consent" : "" });
      });
    }

    // Turn an item into a Calendar event: a 1-hour timed event if it has a time, else all-day.
    function buildEvent(item) {
      const ev = { summary: item.name, description: "From ListSync" };
      if (item.dueTime) {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        ev.start = { dateTime: localDT(item.dueDate, item.dueTime, 0),  timeZone: tz };
        ev.end   = { dateTime: localDT(item.dueDate, item.dueTime, 60), timeZone: tz };
      } else {
        ev.start = { date: item.dueDate };
        ev.end   = { date: addDays(item.dueDate, 1) };  // all-day end is exclusive
      }
      return ev;
    }
    // "2026-06-15T17:30:00" for the due date/time plus N minutes.
    function localDT(ymd, hm, addMin) {
      const [y, m, d] = ymd.split("-").map(Number);
      const [H, M] = hm.split(":").map(Number);
      const dt = new Date(y, m - 1, d, H, M + addMin), p = n => String(n).padStart(2, "0");
      return `${dt.getFullYear()}-${p(dt.getMonth()+1)}-${p(dt.getDate())}T${p(dt.getHours())}:${p(dt.getMinutes())}:00`;
    }

    // Tap 🔔 Remind → silently create the event on the "Sarah Greg Kloey" calendar.
    async function addToCalendar(item) {
      try {
        const token = await getCalendarToken();
        const res = await fetch(
          "https://www.googleapis.com/calendar/v3/calendars/" + encodeURIComponent(CALENDAR_ID) + "/events",
          { method: "POST",
            headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
            body: JSON.stringify(buildEvent(item)) }
        );
        if (res.status === 401) { accessToken = null; throw new Error("Session expired — tap Remind again to re-approve."); }
        if (!res.ok) throw new Error("Calendar said " + res.status + ": " + (await res.text()).slice(0, 140));
        toast("Reminder added to “Sarah Greg Kloey” ✓");
      } catch (e) {
        console.error(e);
        toast("Couldn't add reminder: " + (e.message || "unknown error"));
      }
    }

    // Tiny pop-up message at the bottom of the screen.
    function toast(msg) {
      let t = document.getElementById("toast");
      if (!t) { t = document.createElement("div"); t.id = "toast"; document.body.append(t); }
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => t.classList.remove("show"), 3500);
    }
    // The 📅 button opens ONE shared date picker, remembering which item we're editing.
    let editingItemId = null;
    function editDueDate(itemId) {
      editingItemId = itemId;
      const item = currentList().items.find(i => i.id === itemId);
      const picker = document.getElementById("date-picker");
      picker.value = item.dueDate || "";
      if (picker.showPicker) { try { picker.showPicker(); return; } catch (e) {} }
      picker.click(); // fallback for older browsers
    }
    // The ⏰ chip opens a shared time picker the same way.
    function editDueTime(itemId) {
      editingItemId = itemId;
      const item = currentList().items.find(i => i.id === itemId);
      const picker = document.getElementById("time-picker");
      picker.value = item.dueTime || "";
      if (picker.showPicker) { try { picker.showPicker(); return; } catch (e) {} }
      picker.click();
    }
    function clearDueTime(itemId) {
      const item = currentList().items.find(i => i.id === itemId);
      if (item) { delete item.dueTime; save(); render(); }
    }

    // ---------- ACTIONS (each one changes data, saves, redraws) ----------
    function currentList() { return state.lists.find(l => l.id === state.currentListId) || null; }

    // Each list's color: use the stored one, else derive a stable one from its id
    // (so lists made before this feature existed still get a consistent color).
    function colorOf(list) {
      if (list.color != null) return list.color % 6;
      let h = 0; for (const ch of list.id) h += ch.charCodeAt(0);
      return h % 6;
    }

    function addList(name) {
      name = name.trim();
      if (!name) return;
      state.lists.push({ id: uid(), name, items: [], color: state.lists.length % 6 });
      save(); render();
    }
    function deleteList(id) {
      if (!confirm("Delete this whole list?")) return;
      state.lists = state.lists.filter(l => l.id !== id);
      if (state.currentListId === id) state.currentListId = null;
      save(); render();
    }
    function openList(id) { state.currentListId = id; render(); }
    function goHome()     { state.currentListId = null; render(); }

    function addItem(name) {
      const list = currentList(); name = name.trim();
      if (!list || !name) return;
      list.items.push({ id: uid(), name, checked: false });
      save(); render();
    }
    function renameItem(itemId) {
      const item = currentList().items.find(i => i.id === itemId);
      if (!item) return;
      const name = prompt("Edit item:", item.name);  // pre-filled with the current name
      if (name === null) return;                      // user hit Cancel
      if (!name.trim()) return;                       // ignore an empty name
      item.name = name.trim();
      save(); render();
    }
    function toggleItem(itemId) {
      const item = currentList().items.find(i => i.id === itemId);
      if (item) item.checked = !item.checked;
      save(); render();
    }
    function deleteItem(itemId) {
      const list = currentList();
      list.items = list.items.filter(i => i.id !== itemId);
      expandedIds.delete(itemId);   // tidy up the expansion memory
      removePhoto(itemId);          // and its photo record, if any
      save(); render();
    }
    function clearChecked() {
      const list = currentList();
      list.items.filter(i => i.checked).forEach(i => removePhoto(i.id));  // drop their photos too
      list.items = list.items.filter(i => !i.checked);
      save(); render();
    }

    // ---------- PHOTOS (compressed, each stored as its own small record) ----------
    function pickPhoto(itemId) {
      photoTargetId = itemId;
      document.getElementById("photo-input").click();
    }
    function removePhoto(itemId) {
      if (photos.has(itemId)) deleteDoc(doc(db, "photos", itemId)).catch(e => console.error(e));
    }
    // Shrink a photo on-device to a sharp-but-small JPEG that fits in one cloud record.
    function compressImage(file, maxDim, quality) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width >= height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
          else if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
          const canvas = el("canvas"); canvas.width = width; canvas.height = height;
          canvas.getContext("2d").drawImage(img, 0, 0, width, height);
          let q = quality, url = canvas.toDataURL("image/jpeg", q);
          while (url.length > 950000 && q > 0.3) { q -= 0.12; url = canvas.toDataURL("image/jpeg", q); }
          URL.revokeObjectURL(img.src);
          resolve(url);
        };
        img.onerror = () => { URL.revokeObjectURL(img.src); reject(new Error("bad image")); };
        img.src = URL.createObjectURL(file);
      });
    }
    // Tap a thumbnail → view it big, with a remove option.
    function openLightbox(itemId) {
      const url = photos.get(itemId); if (!url) return;
      const overlay = el("div", { className: "lightbox" }, [
        el("img", { src: url, onclick: (e) => e.stopPropagation() }),
        el("button", { className: "chip", textContent: "🗑 Remove photo",
                       onclick: (e) => { e.stopPropagation(); removePhoto(itemId); overlay.remove(); } }),
      ]);
      overlay.onclick = () => overlay.remove();
      document.body.append(overlay);
    }

    // ---------- DRAWING THE SCREEN ----------
    // Small helper: make an element, set its properties, add children. Using
    // textContent (not innerHTML) keeps item names safe even if they contain < or >.
    function el(tag, props = {}, children = []) {
      const node = document.createElement(tag);
      Object.assign(node, props);
      for (const c of children) node.append(c);
      return node;
    }

    function render() {
      if (!connected) { renderConnecting(); return; }   // wait for the first cloud data
      const list = currentList();
      const back = document.getElementById("back-btn");
      const title = document.getElementById("title");
      // tint the header with the open list's color (plain card color on home)
      document.querySelector("header").className = list ? "list-" + colorOf(list) : "";
      if (list) {
        title.textContent = list.name;
        back.style.visibility = "visible";
        renderItems(list);
        showView("detail");
      } else {
        title.textContent = "ListSync";
        back.style.visibility = "hidden";
        renderLists();
        showView("home");
      }
    }

    function showView(name) {
      document.getElementById("home").style.display   = name === "home"   ? "block" : "none";
      document.getElementById("detail").style.display = name === "detail" ? "block" : "none";
    }

    function renderLists() {
      const box = document.getElementById("lists");
      box.innerHTML = "";
      if (state.lists.length === 0) {
        box.append(el("p", { className: "empty", textContent: "No lists yet. Add one below 👇" }));
        return;
      }
      for (const list of state.lists) {
        const remaining = list.items.filter(i => !i.checked).length;
        const open = () => openList(list.id);
        const c = "list-" + colorOf(list);
        box.append(el("div", { className: "row " + c }, [
          el("span", { className: "row-name", textContent: list.name, onclick: open }),
          el("span", { className: "badge " + c, textContent: String(remaining), onclick: open }),
          el("button", { className: "icon-btn", textContent: "🗑", title: "Delete list",
                         onclick: () => deleteList(list.id) }),
        ]));
      }
    }

    function renderItems(list) {
      const box = document.getElementById("items");
      box.innerHTML = "";
      const unchecked = list.items.filter(i => !i.checked);
      const checked   = list.items.filter(i =>  i.checked);

      if (list.items.length === 0) {
        box.append(el("p", { className: "empty", textContent: "No items yet. Add one above 👆" }));
      }
      for (const item of unchecked) box.append(itemRow(item));
      if (checked.length) {
        box.append(el("div", { className: "divider", textContent: "Purchased" }));
        for (const item of checked) box.append(itemRow(item));
      }
      // only show "Clear checked" when there's something to clear
      document.getElementById("clear-btn").style.display = checked.length ? "block" : "none";
    }

    // ---------- COMPACT, EXPANDABLE ITEM ROWS ----------
    // Which items are currently showing their detail line. This is pure UI state:
    // it stays on THIS device (not synced) and resets on refresh — that's fine.
    const expandedIds = new Set();
    function toggleExpanded(itemId) {
      if (expandedIds.has(itemId)) expandedIds.delete(itemId);
      else expandedIds.add(itemId);
      render();
    }

    function itemRow(item) {
      const expanded = expandedIds.has(item.id);

      // the one compact line: checkbox (taps check off, never expand), optional photo
      // thumbnail, name, a small read-only due chip, and a ▾/▴ caret. Tap line to expand.
      const topKids = [
        el("span", { className: "box", textContent: item.checked ? "☑" : "☐",
                     onclick: (e) => { e.stopPropagation(); toggleItem(item.id); } }),
      ];
      if (photos.has(item.id)) {
        topKids.push(el("img", { className: "thumb", src: photos.get(item.id), alt: "",
                       onclick: (e) => { e.stopPropagation(); openLightbox(item.id); } }));
      }
      topKids.push(el("span", { className: "item-name", textContent: item.name }));
      const top = el("div", { className: "item-top", onclick: () => toggleExpanded(item.id) }, topKids);
      if (!expanded && item.dueDate) {
        top.append(el("span", {
          className: ("chip due-mini " + dueClass(item)).trim(),
          textContent: "📅 " + formatDue(item.dueDate) +
                       (item.dueTime ? " · " + formatTime(item.dueTime) : ""),
        }));
      }
      top.append(el("span", { className: "caret", textContent: expanded ? "▴" : "▾" }));

      const children = [top];

      // the detail line, only while expanded: full chips + edit/delete on the right
      if (expanded) {
        const sub = [];
        if (item.dueDate) {
          sub.push(el("button", { className: "chip " + dueClass(item), title: "Change due date",
                         textContent: "📅 " + formatDue(item.dueDate),
                         onclick: () => editDueDate(item.id) }));
          if (item.dueTime) {
            sub.push(el("button", { className: "chip", title: "Change time",
                           textContent: "⏰ " + formatTime(item.dueTime),
                           onclick: () => editDueTime(item.id) }));
            sub.push(el("button", { className: "chip", title: "Remove time",
                           textContent: "✕", onclick: () => clearDueTime(item.id) }));
          } else {
            sub.push(el("button", { className: "chip muted", title: "Add a time",
                           textContent: "⏰ Add time", onclick: () => editDueTime(item.id) }));
          }
          sub.push(el("button", { className: "chip remind", title: "Add to Google Calendar",
                         textContent: "🔔 Remind", onclick: () => addToCalendar(item) }));
        } else {
          sub.push(el("button", { className: "chip muted", title: "Set due date",
                         textContent: "📅 Add due date", onclick: () => editDueDate(item.id) }));
        }
        sub.push(el("button", { className: "chip", title: photos.has(item.id) ? "Replace photo" : "Add a photo",
                       textContent: photos.has(item.id) ? "📷 Change" : "📷 Add photo",
                       onclick: () => pickPhoto(item.id) }));
        sub.push(el("span", { className: "flex-spacer" }));
        sub.push(el("button", { className: "icon-btn", textContent: "✏️", title: "Edit name",
                       onclick: () => renameItem(item.id) }));
        sub.push(el("button", { className: "icon-btn", textContent: "✕", title: "Delete item",
                       onclick: () => deleteItem(item.id) }));
        children.push(el("div", { className: "item-sub" }, sub));
      }
      return el("div", { className: "row item-row" + (item.checked ? " done" : "") }, children);
    }

    // ---------- WIRING UP THE BUTTONS & INPUTS ----------
    function wireAddBar(inputId, buttonId, action) {
      const input = document.getElementById(inputId);
      const run = () => { action(input.value); input.value = ""; input.focus(); };
      document.getElementById(buttonId).onclick = run;
      input.addEventListener("keydown", e => { if (e.key === "Enter") run(); });
    }
    wireAddBar("new-list-input", "add-list-btn", addList);
    wireAddBar("new-item-input", "add-item-btn", addItem);
    document.getElementById("back-btn").onclick  = goHome;
    document.getElementById("clear-btn").onclick = clearChecked;

    // when the shared date picker changes, save the new date onto the item we're editing
    document.getElementById("date-picker").addEventListener("change", (e) => {
      if (!editingItemId) return;
      const item = currentList().items.find(i => i.id === editingItemId);
      if (item) {
        if (e.target.value) item.dueDate = e.target.value;
        else { delete item.dueDate; delete item.dueTime; } // clearing the date removes the reminder
      }
      editingItemId = null;
      save(); render();
    });
    // same idea for the time picker
    document.getElementById("time-picker").addEventListener("change", (e) => {
      if (!editingItemId) return;
      const item = currentList().items.find(i => i.id === editingItemId);
      if (item) {
        if (e.target.value) item.dueTime = e.target.value;
        else delete item.dueTime;
      }
      editingItemId = null;
      save(); render();
    });
    // when a photo is picked/snapped, shrink it and save it as that item's photo record
    document.getElementById("photo-input").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      e.target.value = "";                 // allow re-picking the same file later
      if (!file || !photoTargetId) return;
      const id = photoTargetId; photoTargetId = null;
      try {
        toast("Adding photo…");
        const url = await compressImage(file, 1024, 0.72);
        await setDoc(doc(db, "photos", id), { data: url });
        toast("Photo added ✓");
      } catch (err) { console.error(err); toast("Couldn't add that photo."); }
    });

    // ---------- SIGN-IN / SIGN-OUT BUTTONS ----------
    document.getElementById("signin-btn").onclick = () => {
      document.getElementById("signin-msg").textContent = "";
      signInWithPopup(auth, provider).catch((e) => {
        document.getElementById("signin-msg").textContent = friendlyAuthError(e);
      });
    };
    document.getElementById("signout-btn").onclick = () => signOut(auth);

    function friendlyAuthError(e) {
      const c = (e && e.code) || "";
      if (c.includes("unauthorized-domain")) return "This site isn't authorized in Firebase yet — add greghulette.github.io to Authorized domains.";
      if (c.includes("operation-not-allowed")) return "Google sign-in isn't switched on in Firebase yet.";
      if (c.includes("popup")) return "Sign-in window was closed before finishing.";
      return (e && e.message) || "Sign-in failed.";
    }

    // ---------- LIGHT / DARK THEME ----------
    // A tiny script in <head> already applied the saved/system theme before paint (no
    // flash). Here we just wire the header toggle and remember the choice on THIS device.
    const themeBtn = document.getElementById("theme-btn");
    function applyThemeIcon() {
      // show the icon for the mode you'd switch TO
      themeBtn.textContent = document.documentElement.classList.contains("light") ? "🌙" : "☀️";
    }
    themeBtn.onclick = () => {
      const isLight = document.documentElement.classList.toggle("light");
      localStorage.setItem("theme", isLight ? "light" : "dark");
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.content = isLight ? "#f4f6fb" : "#0f1220";
      applyThemeIcon();
    };
    applyThemeIcon();

    // ---------- GO! ----------
    render();
  </script>
</body>
</html>
